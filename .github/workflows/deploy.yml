name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout latest code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'oracle'
          java-version: '17'

      # 3. Force clean (VERY IMPORTANT)
      - name: Remove old build
        run: rm -rf target

      # 4. Build project
      - name: Build JAR
        run: ./mvnw clean install -DskipTests

      # 5. DEBUG: verify correct code is inside JAR
      - name: Verify JAR contains new API
        run: |
          echo "===== CHECKING JAR CONTENT ====="
          jar tf target/mailapp-1.0.0.jar | grep Email
          echo "===== CHECKING /all ENDPOINT ====="
          strings target/mailapp-1.0.0.jar | grep "/all" || echo "❌ /all NOT FOUND"

      # 6. Upload JAR to server
      - name: Upload JAR to Server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "target/mailapp-1.0.0.jar"
          target: "/root/"

      # 7. Restart backend
      - name: Restart Backend
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root
            ./backend-deploy.sh