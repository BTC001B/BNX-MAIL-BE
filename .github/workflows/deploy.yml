name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout latest code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Setup Java
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'oracle'
          java-version: '17'

      # 3️⃣ DEBUG: Confirm correct source code
      - name: Debug Controller Source
        run: |
          echo "===== CONTROLLER FILE ====="
          find . -name "EmailManagementController.java"
          echo "===== CHECK /all IN SOURCE ====="
          cat $(find . -name "EmailManagementController.java") | grep "/all" || echo "❌ /all NOT FOUND IN SOURCE"

      # 4️⃣ Force FULL CLEAN (important)
      - name: Clean old build + cache
        run: |
          rm -rf target
          rm -rf ~/.m2/repository/com/btctech

      # 5️⃣ Build project (force fresh compile)
      - name: Build JAR
        run: ./mvnw clean install -DskipTests -U

      # 6️⃣ VERIFY: ensure new API is inside JAR
      - name: Verify JAR content
        run: |
          echo "===== CHECKING JAR CONTENT ====="
          jar tf target/mailapp-1.0.0.jar | grep Email
          echo "===== CHECKING /all ENDPOINT ====="
          strings target/mailapp-1.0.0.jar | grep "/all" || echo "❌ /all NOT FOUND IN JAR"

      # 7️⃣ Upload JAR to server
      - name: Upload JAR to Server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "target/mailapp-1.0.0.jar"
          target: "/root/"

      # 8️⃣ Restart backend
      - name: Restart Backend
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root
            ./backend-deploy.sh