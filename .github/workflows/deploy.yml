name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout latest code (FULL depth to avoid stale refs)
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2️⃣ Setup Java
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'   # more stable than oracle
          java-version: '17'
          cache: maven

      # 3️⃣ DEBUG: Confirm correct source is present
      - name: Debug Controller Source
        run: |
          echo "===== CONTROLLER FILE ====="
          find src -name "EmailManagementController.java"
          echo "===== CHECK /all IN SOURCE ====="
          grep -n "/all" $(find src -name "EmailManagementController.java") || echo "❌ /all NOT FOUND IN SOURCE"

      # 4️⃣ Clean build properly (THIS is the real fix)
      - name: Clean and Build
        run: |
          ./mvnw -B clean verify -DskipTests

      # 5️⃣ VERIFY compiled bytecode (not strings)
      - name: Verify compiled method exists
        run: |
          echo "===== CHECK COMPILED CLASS ====="
          javap -classpath target/mailapp-1.0.0.jar com.btctech.mailapp.controller.EmailManagementController | grep "all" || echo "❌ METHOD NOT FOUND"

      # 6️⃣ Upload JAR
      - name: Upload JAR to Server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "target/mailapp-1.0.0.jar"
          target: "/root/"

      # 7️⃣ Restart backend
      - name: Restart Backend
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set +e
            pkill -f mailapp-1.0.0.jar
            sleep 3

            echo "Starting app..."
            nohup java -jar /root/mailapp-1.0.0.jar > /root/mailapp.log 2>&1 &

            sleep 5
            echo "App logs:"
            tail -20 /root/mailapp.log